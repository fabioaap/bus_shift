<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Shift | Confidencial</title>
    
    <!-- Pré-carregamento de fontes clássicas e macabras -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Special+Elite&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./css/narrative.css">
</head>
<body>
    <!-- Link Direto para o GDD e a História Extensa -->
    <a href="story.html" style="position: absolute; top: 20px; left: 20px; color: #fff; text-decoration: none; font-family: 'Courier Prime', monospace; border: 1px solid rgba(255,255,255,0.3); padding: 10px 15px; background: rgba(0,0,0,0.8); z-index: 9999; font-size: 13px; font-weight: bold; letter-spacing: 1px; transition: all 0.3s; cursor: pointer;" onmouseover="this.style.background='#fff'; this.style.color='#000'; this.style.borderColor='#fff';" onmouseout="this.style.background='rgba(0,0,0,0.8)'; this.style.color='#fff'; this.style.borderColor='rgba(255,255,255,0.3)';">
        &equiv; LER GDD E HISTÓRIA COMPLETA
    </a>

    <!-- Overlay de atmosfera -->
    <div id="vignette"></div>
    <div id="noise-overlay"></div>
    <div id="blood-overlay"></div>
    <div id="desk-light"></div>

    <!-- UI de Interface Diegética -->
    <div id="ui-layer">
        <div id="tension-monitor">
            Nível de Tensão: <span id="tension-value">BAIXO</span>
            <div id="tension-bar-container">
                <div id="tension-bar"></div>
            </div>
        </div>
        <button id="close-btn" class="hidden">Deixar Documento</button>
    </div>

    <!-- Mesa Principal - Elementos da História injetados via JS -->
    <main id="desk"></main>

    <script src="./js/narrative.js"></script>
</body>
</html>
